name: Network Interface Status Check

on:
  workflow_dispatch:   # manual trigger
  push:
    branches:
      - main

jobs:
  run-script:
    runs-on: 
      - self-hosted
    defaults:
      run:
        working-directory: netdevops_labs
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Script
        run: |
          python get_interfaces.py
