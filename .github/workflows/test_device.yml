name: Network Interface Status Check

on:
  workflow_dispatch:   # manual trigger
  push:
    branches:
      - main

jobs:
  run-script:
    runs-on: 
      - self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r netdevops_labs/requirements.txt

      - name: Run Script
        run: |
          python netdevops_labs/get_interfaces.py
